name: anime_instagram
description: Anime themed social app
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  
  # UI
  provider: ^6.0.5
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  intl: ^0.18.1
  timeago: ^3.5.0
  
  # Helpers
  uuid: ^4.2.1
  fluttertoast: ^8.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
